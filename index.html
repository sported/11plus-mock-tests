<html lang="en">

<style>
  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --panel-2:#f7f8fb;
    --ink:#2b2250;
    --ink-soft:#6b6693;
    --line: rgba(43,34,80,0.10);

    --teal:#17b199; --teal-bg:#e2faf5;

    --maths:#2f8fe0; --maths-bg:#eaf4ff;
    --english:#ff6f91; --english-bg:#ffeff4;
    --verbal:#8e5ce0; --verbal-bg:#f3ecfe;
    --nonverbal:#17b199; --nonverbal-bg:#e2faf5;
    --spellings:#ffa53e; --spellings-bg:#fff4e3;

    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html{ overflow-x: hidden; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text, var(--ink));
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height:100vh;
    padding: 24px 16px 60px;
    position: relative;
    overflow-x: hidden;
    max-width: 100vw;
  }
  .blob{ position:absolute; border-radius:50%; filter: blur(2px); opacity:0.5; z-index:0; }
  .blob1{ width:180px; height:180px; background: var(--maths-bg); top:-60px; right:-50px; }
  .blob2{ width:120px; height:120px; background: var(--spellings-bg); top:120px; left:-40px; }
  .blob3{ width:90px; height:90px; background: var(--english-bg); top:280px; right:10%; }

  .wrap{ max-width: 720px; margin: 0 auto; position:relative; z-index:1; }

  .ticket{
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 22px 24px 20px;
    margin-bottom: 18px;
    box-shadow: 0 4px 18px rgba(43,34,80,0.06);
  }
  .eyebrow{
    font-family: 'Fredoka', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
    font-weight:600;
    color: var(--teal);
    margin: 0 0 6px;
  }
  h1{
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 27px;
    margin: 0 0 6px;
    color: var(--ink);
  }
  .sub{ color: var(--ink-soft); font-size: 14px; line-height:1.5; margin: 0; }

  .home-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; }
  .greet{ font-family:'Fredoka', sans-serif; font-size:22px; color:var(--ink); margin:0 0 4px; }
  .level-chip{
    display:flex; align-items:center; gap:8px;
    background: var(--amber-bg);
    border-radius: 20px;
    padding: 8px 14px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size: 14px;
    color:#8a5b06;
    white-space:nowrap;
  }
  .logout-link{ background:none; border:none; color:var(--ink-soft); font-size:12.5px; text-decoration:underline; cursor:pointer; padding:0; margin-top:8px; }

  .wallet-banner{
    margin-top: 16px;
    background: linear-gradient(135deg, var(--teal-bg) 0%, var(--amber-bg) 100%);
    border: 1.5px solid var(--teal);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
  }
  .wallet-label{ font-family:'Fredoka', sans-serif; font-size: 13px; font-weight:600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; }
  .wallet-amount{ font-family:'Fredoka', sans-serif; font-size: 44px; font-weight: 700; color: #0d7a68; line-height: 1.2; margin: 2px 0; }
  .wallet-sub{ font-size: 12px; color: var(--ink-soft); }

  .reward-callout{
    margin-top: 12px;
    background: var(--amber-bg);
    border: 1.5px dashed var(--amber);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13.5px;
    color: #8a5b06;
    text-align: center;
  }

  .reward-banner{
    margin: 14px 0;
    background: linear-gradient(135deg, var(--teal-bg) 0%, var(--amber-bg) 100%);
    border: 2px solid var(--teal);
    border-radius: 16px;
    padding: 16px;
    text-align: center;

  .reward-banner-sub{ font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
  .reward-miss-banner{

    background: var(--panel-2);

    border-radius: 14px;
    padding: 14px;
    text-align: center;
    font-size: 13.5px;
    color: var(--ink-soft);
  }

    top: -20px;
    border-radius: 2px;

    animation-fill-mode: forwards;

  .qmeta-right{ display:flex; align-items:center; gap:10px; }

  .badge-row{ display:flex; flex-wrap:wrap; gap:8px; margin: 10px 0 4px; }
  .badge-chip{ background: var(--teal); color:#fff; font-size: 12.5px; font-weight:700; padding: 7px 13px; border-radius: 20px; font-family:'Fredoka',sans-serif;}

  .breakdown{ margin-top: 22px; display:flex; flex-direction:column; gap:10px; }
  .bd-row{ display:flex; align-items:center; gap:10px; font-size:13.5px; }
  .bd-label{ width: 150px; color: var(--ink-soft); flex-shrink:0; font-weight:700; }
  .bd-bar{ flex:1; height:9px; background: var(--line); border-radius:5px; overflow:hidden; }
  .bd-fill{ height:100%; background: var(--teal); border-radius:5px; }
  .bd-frac{ width:38px; text-align:right; font-family: 'Fredoka', sans-serif; color: var(--ink-soft); font-size:12px;}

  .review-list{ margin-top: 14px; display:flex; flex-direction:column; gap:8px; }
  .review-item{ border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 13.5px; background: var(--panel-2); display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .review-item.answered{ border-left: 4px solid var(--teal); }
  .review-item.unanswered{ border-left: 4px solid var(--coral); }
  .review-item.correct{ border-left: 4px solid var(--teal); }
  .review-item.wrong{ border-left: 4px solid var(--coral); }
  .review-item .rq{ color: var(--ink); margin-bottom:5px; font-weight:600; }
  .review-item .ra{ color: var(--ink-soft); display:flex; gap:14px; flex-wrap:wrap; }
  .review-item .ra span.label{ color: var(--ink-soft); }
  .review-item .ra span.val-correct{ color: var(--teal); font-weight:700; }
  .review-item .ra span.val-wrong{ color: var(--coral); font-weight:700; }
  .review-item .val-empty{ color: var(--coral); font-style:italic; }
  .explain-text{ margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); font-size:12.5px; color:var(--ink-soft); line-height:1.5; }
  .review-left{ flex:1; }
  .edit-btn{ background: var(--panel); border: 2px solid var(--line); color: var(--ink); font-size: 12px; font-weight:700; padding: 7px 12px; border-radius: 10px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  .edit-btn:hover{ border-color: var(--amber); }

  .name-row{ display:flex; flex-direction:column; gap:14px; }
  .field-label{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; font-weight:700; }
  .center-msg{ text-align:center; color:var(--ink-soft); font-size:14px; padding: 40px 10px; }

  /* home tiles */
  .tiles-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:14px; margin-top: 8px; }
  .tile{ text-align:left; border:none; cursor:pointer; border-radius: 16px; padding:0; overflow:hidden; background: var(--panel); border: 1px solid var(--line); box-shadow: 0 3px 10px rgba(43,34,80,0.05); transition: transform 0.12s; }
  .tile:hover{ transform: translateY(-2px); }
  .tile-top{ padding: 16px 16px 12px; }
  .tile-icon{ font-size: 26px; margin-bottom:8px; display:block; }
  .tile-title{ font-family:'Fredoka', sans-serif; font-size:16px; color:var(--ink); margin:0 0 4px; line-height:1.3; }
  .tile-subject{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; }
  .tile-meta{ display:flex; gap:10px; font-size:11.5px; color:var(--ink-soft); font-weight:700; margin-top:8px; }
  .tile-status{ padding:9px 16px; font-size:12.5px; font-weight:700; }
  .tile-status.done{ background: var(--teal-bg); color:#0d7a68; }
  .tile-status.todo{ background: var(--panel-2); color:var(--ink-soft); }

  footer.note{ text-align:center; color: var(--ink-soft); font-size: 12px; margin-top: 22px; line-height:1.6; }
</style>
</head>

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dHd4ZWlldHFydGZyc3p6YmNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzU3MDEsImV4cCI6MjA5OTAxMTcwMX0.r8Mz8IKeeRRVDjNLlD-HmMeEpbsnzfKkiPzltHRaKyQ";

const SUBJECTS = {
  maths: { label:'Maths', icon:'🔢', color:'var(--maths)', bg:'var(--maths-bg)' },
  english: { label:'English', icon:'📚', color:'var(--english)', bg:'var(--english-bg)' },

function subjectInfo(v){ return SUBJECTS[v] || { label:v, icon:'📄', color:'var(--ink-soft)', bg:'var(--panel-2)' }; }

function sbHeaders(extra){
  return Object.assign({ 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' }, extra || {});
}
async function sbGet(path){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: sbHeaders() });
  if(!res.ok) throw new Error('Request failed: ' + path);
  return res.json();
}
async function sbPost(path, body, prefer){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { method: 'POST', headers: sbHeaders({ 'Prefer': prefer || 'return=representation' }), body: JSON.stringify(body) });
  if(!res.ok) throw new Error('Insert failed: ' + path + ' ' + (await res.text()));
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}
async function sbPatch(path, body, prefer){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { method: 'PATCH', headers: sbHeaders({ 'Prefer': prefer || 'return=representation' }), body: JSON.stringify(body) });
  if(!res.ok) throw new Error('Update failed: ' + path);
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function normalize(str){
  return String(str).trim().toLowerCase().replace(/£/g,'').replace(/\s+/g,'').replace(/,/g,'').replace(/−/g,'-');
}

// Common units a student might reasonably type that the stored correct_answer omits.
// Ordered longest-first so e.g. 'cm2' is tried before 'cm', 'mm' before 'm'.
const UNIT_SUFFIXES = ['pence','minutes','hours','mins','hrs','sqcm','cm2','cm²','cm3','cm³','mph','pts','pt','hr','min','kg','mg','ml','km','mm','cm','m','l','g','p','%'];

function stripTrailingUnit(s){
  for(const u of UNIT_SUFFIXES){
    if(s.length > u.length && s.endsWith(u)) return s.slice(0, -u.length);
  }
  return s;
}

function answersMatch(userAnswer, correctAnswer){
  if(userAnswer === null) return false;
  const u = normalize(userAnswer);
  const c = normalize(correctAnswer);
  if(u === c) return true;
  // allow the student's answer to include a unit the stored answer doesn't (e.g. '8cm' vs '8')
  if(stripTrailingUnit(u) === c) return true;
  return false;
}
function formatTime(s){
  const m = Math.floor(s/60); const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function levelForXp(xp){ return Math.floor(xp / LEVEL_STEP) + 1; }
function rewardThreshold(total){ return Math.floor(total * 0.75) + 1; }
function pointsFor(item){ return item.isBoss ? 2 : 1; }
function maxPoints(questions){ return questions.reduce((sum, q) => sum + pointsFor(q), 0); }
function formatWallet(cents){
  const dollars = cents / 100;
  return '$' + (cents % 100 === 0 ? dollars.toString() : dollars.toFixed(2));
}

async function init(){
  titleText.textContent = '11+ Mock Tests';
  subText.textContent = 'Loading…';
  scoreboard.style.display = 'none';
  progressRow.innerHTML = '';
  try{
    ALL_TESTS = await sbGet('mock_tests?select=*&order=created_at.desc');
    const saved = localStorage.getItem(SESSION_KEY);
    if(saved){
      try{
        const { name, passwordHash } = JSON.parse(saved);
        const ok = await loadStudentByHash(name, passwordHash);
        if(ok){ renderHome(); return; }
      } catch(e){ /* fall through to login */ }
      localStorage.removeItem(SESSION_KEY);
    }
    renderSetup();
  } catch(err){
    console.error(err);
    quizCard.innerHTML = '<div class="center-msg">Could not load tests from the database. Check your connection and reload.</div>';
  }
}

function renderSetup(msg){

      <div><span class="field-label">Your name</span><input type="text" id="nameInput" name="student_display_name" placeholder="e.g. Alex Smith" autocomplete="off" data-lpignore="true" data-1p-ignore /></div>
      <div><span class="field-label">Password</span><input type="password" id="passInput" name="student_access_code" autocomplete="new-password" data-lpignore="true" data-1p-ignore /></div>
      </form>
      <div class="actions" style="padding-top:6px;"><span></span><button class="primary" id="startBtn" disabled>Log in</button></div>
      <div id="setupMsg">${msg ? `<p class="sub" style="color:var(--coral);">${msg}</p>` : ''}</div>
    </div>
  `;
  const nameInput = document.getElementById('nameInput');
  const passInput = document.getElementById('passInput');
  const startBtn = document.getElementById('startBtn');
  function checkReady(){ startBtn.disabled = nameInput.value.trim().length === 0 || passInput.value.length === 0; }
  nameInput.addEventListener('input', checkReady);
  passInput.addEventListener('input', checkReady);
  passInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !startBtn.disabled) startBtn.click(); });

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true; startBtn.textContent = 'Checking…';
    try{
      const name = nameInput.value.trim();
      const hash = await sha256(passInput.value);
      const ok = await loadStudentByHash(name, hash);
      if(!ok){
        renderSetup("Name or password not recognised. Ask your teacher if you don't have an account yet.");
        return;
      }
      localStorage.setItem(SESSION_KEY, JSON.stringify({ name, passwordHash: hash }));
      renderHome();
    } catch(err){
      console.error(err);
      quizCard.innerHTML = '<div class="center-msg">Something went wrong logging in. Please reload and try again.</div>';
    }
  });
}

async function loadStudentByHash(name, hash){
  const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/verify_student_login', {
    method: 'POST',
    headers: sbHeaders(),
    body: JSON.stringify({ p_name: name, p_password_hash: hash })
  });
  if(!res.ok) return false;
  const rows = await res.json();
  if(!rows.length) return false;
  student = rows[0];
  const badges = await sbGet('badges?student_id=eq.' + student.id + '&select=badge_key');
  existingBadgeKeys = new Set(badges.map(b => b.badge_key));
  return true;
}

async function renderHome(){
  view = 'home';
  quizCard.className = 'card';
  scoreboard.style.display = 'none';
  progressRow.innerHTML = '';
  titleText.textContent = '11+ Mock Tests';
  ticketHome();
  quizCard.innerHTML = '<div class="center-msg">Loading your tests…</div>';

  let attempts = [];
  try{
    attempts = await sbGet('attempts?student_id=eq.' + student.id + '&select=*&order=submitted_at.desc');
  } catch(err){ console.error(err); }

  const latestByTest = {};
  attempts.forEach(a => { if(!latestByTest[a.mock_test_id]) latestByTest[a.mock_test_id] = a; });
  LATEST_ATTEMPTS = latestByTest;

  if(!ALL_TESTS.length){
    quizCard.innerHTML = '<div class="center-msg">No mock tests are available yet — check back soon!</div>';
    return;
  }

  const tilesHtml = ALL_TESTS.map(t => {
    const info = subjectInfo(t.subject);
    const attempt = latestByTest[t.id];
    const statusHtml = attempt
      ? `<div class="tile-status done">✅ ${attempt.score}/${attempt.total_questions} &middot; ${Math.round((attempt.score/attempt.total_questions)*100)}% &middot; tap to review</div>`
      : `<div class="tile-status todo">▶ Not started</div>`;
    return `
      <button class="tile" data-test-id="${t.id}">
        <div class="tile-top" style="background:${info.bg};">

          <p class="tile-title">${t.title}</p>
          <span class="tile-subject" style="color:${info.color};">${info.label}</span>
          <div class="tile-meta"><span>⏱ ${Math.round((t.time_limit_seconds||0)/60)} min</span></div>
        </div>
        ${statusHtml}
      </button>
    `;
  }).join('');

  quizCard.innerHTML = `<div class="tiles-grid">${tilesHtml}</div>`;
  quizCard.querySelectorAll('.tile').forEach(el => {
    el.addEventListener('click', async () => {
      const testId = el.dataset.testId;
      MOCK_TEST = ALL_TESTS.find(t => t.id === testId);
      const priorAttempt = LATEST_ATTEMPTS[testId];
      quizCard.innerHTML = '<div class="center-msg">Loading…</div>';
      try{
        if(priorAttempt){
          await renderPastAttemptReview(priorAttempt);
        } else {
          await loadQuestions(testId);
          beginTest();
        }
      } catch(err){
        console.error(err);
        quizCard.innerHTML = '<div class="center-msg">Could not load that test. Please try again.</div>';
      }
    });
  });
}

async function renderPastAttemptReview(attempt){

async function loadQuestions(testId){
  const rows = await sbGet('questions?mock_test_id=eq.' + testId + '&select=*&order=order_index.asc');
  QUESTIONS = rows.map(r => ({ id:r.id, topic:r.topic, type:r.type, q:r.question_text, options:r.options, answer:r.correct_answer, isBoss:r.is_boss_round, xp:r.xp_value, explanation:r.explanation }));
  TOPIC_ORDER = [...new Set(QUESTIONS.map(q => q.topic))];
  TIME_LIMIT = MOCK_TEST.time_limit_seconds || 1800;
  secondsLeft = TIME_LIMIT;
  answers = new Array(QUESTIONS.length).fill(null);
}

function beginTest(){
  current = 0; finished = false; view = 'question';
  ticketQuiz();
  // re-bind live elements after ticket rebuild
  window.ledQEl = document.getElementById('ledQ');
  window.ledTimerEl = document.getElementById('ledTimer');
  window.ledTimerBoxEl = document.getElementById('ledTimerBox');
  window.ledLevelEl = document.getElementById('ledLevel');
  window.progressRowEl = document.getElementById('progressRow');
  initDots();
  renderQuestion();
  startTimer();
}

function initDots(){
  const pr = document.getElementById('progressRow');
  pr.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (q.isBoss ? ' boss' : '');
    d.id = 'dot-' + i;
    d.type = 'button';
    d.title = 'Question ' + (i+1) + (q.isBoss ? ' (Boss Round)' : '');
    d.addEventListener('click', () => { if(finished) return; saveCurrentAnswerIfOnQuestion(); goToQuestion(i); });
    pr.appendChild(d);
  });
}
function refreshDots(){
  QUESTIONS.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    if(!d) return;
    d.classList.remove('current','done');
    if(view === 'question' && i === current) d.classList.add('current');
    else if(answers[i] !== null) d.classList.add('done');
  });
}

function startTimer(){
  timerInterval = setInterval(() => {
    secondsLeft--;
    const timerEl = document.getElementById('ledTimer');
    const timerBoxEl = document.getElementById('ledTimerBox');
    if(secondsLeft <= 0){
      secondsLeft = 0;
      if(timerEl) timerEl.textContent = formatTime(0);
      clearInterval(timerInterval);
      saveCurrentAnswerIfOnQuestion();
      gradeAndShowResults();
      return;
    }
    if(timerEl) timerEl.textContent = formatTime(secondsLeft);
    if(secondsLeft <= 60 && timerBoxEl) timerBoxEl.classList.add('warn');
  }, 1000);
}

function saveCurrentAnswerIfOnQuestion(){
  if(view !== 'question') return;
  const item = QUESTIONS[current];
  if(item.type === 'mcq'){
    const sel = quizCard.querySelector('.opt.selected');
    answers[current] = sel ? sel.dataset.val : answers[current];
  } else {
    const input = document.getElementById('answerInput');
    if(input){ const v = input.value.trim(); answers[current] = v.length ? v : answers[current]; }
  }
}
function updateLedQ(){
  const el = document.getElementById('ledQ');
  if(el) el.textContent = Math.min(current+1, QUESTIONS.length) + '/' + QUESTIONS.length;
}
function goToQuestion(idx){ current = idx; view = 'question'; renderQuestion(); }

function renderQuestion(){
  updateLedQ();
  refreshDots();
  const item = QUESTIONS[current];
  const existing = answers[current];

  let html = item.isBoss ? '<div class="boss-banner">⚔ Boss round — worth 2 points + double XP</div>' : '';
  html += `
    <div class="qmeta">
      <span class="qnum">Q${current+1} of ${QUESTIONS.length}</span>
      <div class="qmeta-right"><span class="topic-tag">${item.topic}</span><button class="link-btn" id="reviewLink">Review all answers</button></div>
    </div>
    <div class="qtext">${item.q}</div>
  `;
  if(item.type === 'mcq'){
    html += '<div class="options" id="optionsWrap">';
    (item.options || []).forEach(opt => {
      const sel = existing === opt ? ' selected' : '';
      html += `<button class="opt${sel}" data-val="${opt}">${opt}</button>`;
    });
    html += '</div>';
  } else {
    html += `<div class="input-row"><input type="text" id="answerInput" placeholder="Type your answer" autocomplete="off" value="${existing ? existing.replace(/"/g,'&quot;') : ''}" /></div>`;
  }
  html += `
    <div class="actions">
      <button class="ghost" id="prevBtn" ${current === 0 ? 'disabled' : ''}>Back</button>
      <button class="primary" id="nextBtn" ${existing ? '' : 'disabled'}>${current === QUESTIONS.length - 1 ? 'Review answers' : 'Next question'}</button>
    </div>
  `;
  quizCard.className = 'card' + (item.isBoss ? ' boss' : '');
  quizCard.innerHTML = html;

  document.getElementById('reviewLink').addEventListener('click', () => { saveCurrentAnswerIfOnQuestion(); renderReview(); });
  document.getElementById('prevBtn').addEventListener('click', () => { saveCurrentAnswerIfOnQuestion(); goToQuestion(current - 1); });

  const nextBtn = document.getElementById('nextBtn');
  if(item.type === 'mcq'){
    const buttons = quizCard.querySelectorAll('.opt');
    buttons.forEach(b => {
      b.addEventListener('click', () => {
        buttons.forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        answers[current] = b.dataset.val;
        nextBtn.disabled = false;
      });
    });
  } else {
    const input = document.getElementById('answerInput');
    input.addEventListener('input', () => { nextBtn.disabled = input.value.trim().length === 0; });
    input.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !nextBtn.disabled) nextBtn.click(); });
  }
  nextBtn.addEventListener('click', () => {
    saveCurrentAnswerIfOnQuestion();
    if(current === QUESTIONS.length - 1) renderReview(); else goToQuestion(current + 1);
  });
}

function renderReview(){
  view = 'review';
  quizCard.className = 'card';
  refreshDots();
  const answeredCount = answers.filter(a => a !== null).length;
  let listHtml = '<div class="review-list">';
  QUESTIONS.forEach((item, i) => {
    const val = answers[i];
    listHtml += `
      <div class="review-item ${val !== null ? 'answered' : 'unanswered'}">
        <div class="review-left">
          <div class="rq">Q${i+1}${item.isBoss ? ' ⚔ (2 points)' : ''}. ${item.q}</div>
          <div class="ra"><span><span class="label">Your answer:</span> ${val !== null ? val : '<span class="val-empty">Not answered</span>'}</span><span class="topic-tag" style="font-size:10px;">${item.topic}</span></div>
        </div>
        <button class="edit-btn" data-idx="${i}">Edit</button>
      </div>
    `;
  });
  listHtml += '</div>';
  quizCard.innerHTML = `
    <div class="results">
      <h2>Review your answers</h2>
      <p class="sub" style="margin:0 0 4px;">${answeredCount} of ${QUESTIONS.length} answered. Tap Edit on any question to change your answer, then submit when you're ready.</p>
      ${listHtml}
      <div class="actions" style="justify-content:space-between; margin-top:20px;">
        <button class="ghost" id="backToQBtn">Back to last question</button>
        <button class="primary" id="submitBtn">Submit test</button>
      </div>
    </div>
  `;
  quizCard.querySelectorAll('.edit-btn').forEach(b => { b.addEventListener('click', () => goToQuestion(parseInt(b.dataset.idx, 10))); });
  document.getElementById('backToQBtn').addEventListener('click', () => goToQuestion(QUESTIONS.length - 1));
  document.getElementById('submitBtn').addEventListener('click', () => {
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Submitting…';
    gradeAndShowResults();
  });
}

async function gradeAndShowResults(){
  if(finished) return;
  finished = true; view = 'results';
  clearInterval(timerInterval);
  quizCard.className = 'card';

  const total = maxPoints(QUESTIONS);
  const graded = QUESTIONS.map((item, i) => {
    const userAnswer = answers[i];
    const correct = answersMatch(userAnswer, item.answer);
    return { item, userAnswer, correct, xpAwarded: correct ? item.xp : 0, points: pointsFor(item) };
  });
  const score = graded.filter(g => g.correct).reduce((sum, g) => sum + g.points, 0);
  const pct = Math.round((score/total)*100);
  const timeUsed = TIME_LIMIT - secondsLeft;
  const xpEarned = graded.reduce((sum, g) => sum + g.xpAwarded, 0);

  const byTopic = {};
  graded.forEach(g => {
    const t = g.item.topic;
    if(!byTopic[t]) byTopic[t] = {correct:0, total:0};
    byTopic[t].total++;
    if(g.correct) byTopic[t].correct++;
  });

  const newlyEarnedBadges = [];
  Object.keys(byTopic).forEach(t => {
    const {correct, total: tt} = byTopic[t];
    if(correct === tt){
      const key = t.toLowerCase().replace(/[^a-z0-9]+/g,'_') + '_whiz';
      if(!existingBadgeKeys.has(key)) newlyEarnedBadges.push({ key, label: t + ' Whiz', topic: t });
    }
  });

  const newTotalXp = student.total_xp + xpEarned;
  const newLevel = levelForXp(newTotalXp);
  const leveledUp = newLevel > student.level;

  const threshold = rewardThreshold(total);
  const earnedReward = score >= threshold;
  const newWalletCents = (student.wallet_cents || 0) + (earnedReward ? 200 : 0);

  quizCard.innerHTML = '<div class="center-msg">Saving your results…</div>';

  try{
    const attemptRows = await sbPost('attempts', {
      student_id: student.id, mock_test_id: MOCK_TEST.id, score, total_questions: total,
      xp_earned: xpEarned, time_used_seconds: timeUsed, submitted_at: new Date().toISOString()
    });
    const attemptId = attemptRows[0].id;
    const answerRows = graded.map(g => ({ attempt_id: attemptId, question_id: g.item.id, student_answer: g.userAnswer, is_correct: g.correct, xp_awarded: g.xpAwarded }));
    await sbPost('attempt_answers', answerRows, 'return=minimal');
    if(newlyEarnedBadges.length){
      await sbPost('badges?on_conflict=student_id,badge_key', newlyEarnedBadges.map(b => ({ student_id: student.id, badge_key: b.key, badge_label: b.label, topic: b.topic })), 'return=minimal,resolution=ignore-duplicates');
      newlyEarnedBadges.forEach(b => existingBadgeKeys.add(b.key));
    }
    await sbPatch('students?id=eq.' + student.id, { total_xp: newTotalXp, level: newLevel, wallet_cents: newWalletCents }, 'return=minimal');
    student.total_xp = newTotalXp; student.level = newLevel; student.wallet_cents = newWalletCents;
  } catch(err){ console.error(err); }

  renderResultsScreen(graded, score, total, pct, timeUsed, xpEarned, newTotalXp, newLevel, leveledUp, newlyEarnedBadges, byTopic, earnedReward, newWalletCents, threshold);
}

function renderResultsScreen(graded, score, total, pct, timeUsed, xpEarned, newTotalXp, newLevel, leveledUp, newlyEarnedBadges, byTopic, earnedReward, newWalletCents, threshold){
  const lvlEl = document.getElementById('ledLevel');
  if(lvlEl) lvlEl.textContent = 'Lvl ' + newLevel;

  let breakdownHtml = '<div class="breakdown">';
  TOPIC_ORDER.forEach(t => {
    if(!byTopic[t]) return;
    const {correct, total: tt} = byTopic[t];
    const p = Math.round((correct/tt)*100);
    breakdownHtml += `<div class="bd-row"><div class="bd-label">${t}</div><div class="bd-bar"><div class="bd-fill" style="width:${p}%"></div></div><div class="bd-frac">${correct}/${tt}</div></div>`;
  });
  breakdownHtml += '</div>';

  let reviewHtml = '<div class="review-list">';
  graded.forEach((g, i) => {
    reviewHtml += `
      <div class="review-item ${g.correct ? 'correct' : 'wrong'}">
        <div class="review-left">
          <div class="rq">Q${i+1}${g.item.isBoss ? ' ⚔ (2 points)' : ''}. ${g.item.q}</div>
          <div class="ra"><span><span class="label">Your answer:</span> <span class="${g.correct ? 'val-correct' : 'val-wrong'}">${g.userAnswer !== null ? g.userAnswer : '(no answer)'}</span></span><span><span class="label">Correct answer:</span> <span class="val-correct">${g.item.answer}</span></span></div>
          ${g.item.explanation ? `<div class="explain-text">${g.item.explanation}</div>` : ''}
        </div>
      </div>
    `;
  });
  reviewHtml += '</div>';

  let message;
  if(pct >= 85) message = "Amazing work — strong across almost every topic! 🌟";
  else if(pct >= 65) message = "Solid result — a couple of topics are worth another look.";
  else if(pct >= 40) message = "Good starting point. Let's focus on the topics below one at a time.";
  else message = "This has flagged the right areas to work on next — that's exactly what a mock is for.";

  const badgeHtml = newlyEarnedBadges.length ? `<div class="badge-row">${newlyEarnedBadges.map(b => `<span class="badge-chip">🏅 ${b.label}</span>`).join('')}</div>` : '';
  const levelBanner = leveledUp ? `<div class="level-up-banner">🎉 Level up! You're now Level ${newLevel}.</div>` : '';
  const rewardBanner = earnedReward
    ? `<div class="reward-banner"><div class="reward-banner-big">💵 You earned $2!</div><div class="reward-banner-sub">${score}/${total} beats the ${threshold}-correct goal. Wallet total: ${formatWallet(newWalletCents)}</div></div>`
    : `<div class="reward-miss-banner">Needed ${threshold} or more correct to earn $2 this time — got ${score}. So close! Try again for the reward.</div>`;

  quizCard.innerHTML = `
    <div class="results">
      <h2>Test complete, ${student.name}! 🎉</h2>
      <p class="sub" style="margin:0;">${message}</p>
      <div class="big-score">${score}/${total}</div>
      <p class="sub" style="margin:0 0 4px;">${pct}% correct &middot; ${formatTime(timeUsed)} used &middot; +${xpEarned} XP (total ${newTotalXp} XP)</p>
      ${rewardBanner}
      ${levelBanner}${badgeHtml}${breakdownHtml}
      <p class="sub" style="margin-top:20px;">Full answer summary:</p>
      ${reviewHtml}
      <div class="actions" style="justify-content:flex-start; margin-top:24px;">
        <button class="primary" id="homeBtn">Back to my tests</button>
      </div>
    </div>
  `;
  document.getElementById('homeBtn').addEventListener('click', () => { renderHome(); });
  if(earnedReward) launchConfetti();
}

function launchConfetti(){
  const colors = ['#ffb020','#17b199','#8e5ce0','#ff6f91','#2f8fe0'];
  const container = document.createElement('div');
  container.className = 'confetti-layer';
  document.body.appendChild(container);
  const count = 60;
  for(let i = 0; i < count; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    piece.style.width = piece.style.height = (6 + Math.random() * 6) + 'px';
    piece.style.transform = 'rotate(' + Math.floor(Math.random() * 360) + 'deg)';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 4200);
}

init();
</script>
</body>
</html>
